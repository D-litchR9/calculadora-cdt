<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html">
<h:head>
    <title>Registro de inversión CDT</title>
</h:head>
<h:body>
    <h1>Nueva inversión CDT</h1>
    <h:form>
        <!-- 4 campos requeridos (ID se genera automáticamente, no se muestra) -->
        <div>
            <h:outputLabel value="identificador del usuario de la nueva inversión:" />
            <h:inputText value="#{cdtController.identificadorUsuarioSeleccionado}" required="true" />
        </div>
        <div>
            <h:outputLabel value="Nombre de la inversión:" />
            <h:inputText value="#{cdtController.nuevaInversionNombre}" required="true" />
        </div>
        <div>
            <h:outputLabel value="Monto a invertir:" />
            <h:inputText value="#{cdtController.nuevaInversionMonto}" required="true" />
        </div>
        <div>
            <h:outputLabel value="Plazo (días):" />
            <h:inputText value="#{cdtController.nuevaInversionPlazo}" required="true" />
        </div>
        <div>
            <h:outputLabel value="Tasa anual (%):" />
            <h:inputText value="#{cdtController.nuevaInversionTasa}" required="true" />
        </div>

        <!-- Botones -->
        <div>
            <h:commandButton value="Registar Inversión y calcular Valores" action="#{cdtController.registrarInversionDesdeVista}" />
            <h:commandButton value="Tabla Usuarios" 
                             action="#{cdtController.guardarYRedirigir}" />
        </div>
    </h:form>

    <!-- Panel para mostrar resultados (solo si ya se calculó) -->
    <h:panelGroup rendered="#{cdtController.gananciaBrutaCalculada != null}">
        <h2>Resultado del cálculo</h2>
        <div>Ganancia bruta: #{cdtController.gananciaBrutaCalculada}</div>
        <div>Ganancia neta (después de 4%): #{cdtController.gananciaNetaCalculada}</div>
    </h:panelGroup>

    <!-- Mensajes globales (éxito/error) -->
    <h:messages />
</h:body>
</html>
